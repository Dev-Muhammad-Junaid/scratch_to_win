# Builds example/ as Flutter Web and deploys to GitHub Pages.
# Repo Settings → Pages → Build and deployment: set source to "GitHub Actions".

name: Deploy example (web)

on:
  push:
    branches: [main]
    paths:
      - "example/**"
      - "lib/**"
      - "pubspec.yaml"
      - ".github/workflows/deploy_example_web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-example
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get (package)
        run: flutter pub get

      - name: Build web (example)
        working-directory: example
        run: |
          flutter pub get
          flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: example/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
